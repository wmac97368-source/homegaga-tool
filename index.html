<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弘加佳 | 成家方案報價計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'h-blue': '#1a2b49', // 弘加佳深藍
                        'h-gold': '#c59a68', // 弘加佳金
                        'h-gold-light': '#d4b38a',
                        'h-gray': '#f5f5f7'
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f0f2f5;
            -webkit-font-smoothing: antialiased;
        }

        /* 隱藏預設的 input range 樣式 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* 自訂滑動軌道 (Track) - Webkit */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            border-radius: 9999px;
            /* 背景顏色會透過 React inline style 動態改變以呈現進度 */
        }

        /* 自訂滑動鈕 (Thumb) - Webkit */
        input[type=range]::-webkit-slider-thumb {
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -10px;
            box-shadow: 0 0 0 6px #d4b38a, 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* 自訂滑動軌道 (Track) - Firefox */
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 9999px;
        }

        /* 自訂滑動鈕 (Thumb) - Firefox */
        input[type=range]::-moz-range-thumb {
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: 6px solid #d4b38a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        /* 隱藏數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function CalculatorApp() {
            const minPing = 15;
            const maxPing = 100; // 允許輸入更大的坪數，但滑桿最高顯示到一個合理值
            const sliderMax = 50; 
            const [ping, setPing] = React.useState(minPing);
            const [inputValue, setInputValue] = React.useState(minPing.toString());
            
            // 處理手動輸入坪數
            const handleInputChange = (e) => {
                const val = e.target.value;
                setInputValue(val);
                
                const parsedVal = parseInt(val, 10);
                if (!isNaN(parsedVal)) {
                    // 輸入時即時更新計算結果，但不強制設為最小值，讓使用者能自由刪除輸入
                    setPing(parsedVal);
                } else {
                    setPing(0); // 清空時預設為0，但計算邏輯會確保最少以15坪計
                }
            };

            // 輸入框失去焦點時，確保坪數不低於15
            const handleInputBlur = () => {
                const parsedVal = parseInt(inputValue, 10);
                if (isNaN(parsedVal) || parsedVal < minPing) {
                    setInputValue(minPing.toString());
                    setPing(minPing);
                } else {
                    setInputValue(parsedVal.toString());
                    setPing(parsedVal);
                }
            };

            // 處理滑桿變動
            const handleSliderChange = (e) => {
                const val = parseInt(e.target.value, 10);
                setPing(val);
                setInputValue(val.toString());
            };
            
            // 價格設定
            const standardPricePerPing = 15000;
            const discountPricePerPing = 13500; // 9折早鳥優惠

            // 計算邏輯：不足15坪以15坪計
            const effectivePing = Math.max(minPing, ping);
            
            const standardTotal = effectivePing * standardPricePerPing;
            const discountTotal = effectivePing * discountPricePerPing;

            // 計算滑桿進度百分比，用於自訂軌道顏色
            // 如果輸入值大於滑桿最大值，進度條填滿
            const displayPingForSlider = Math.min(effectivePing, sliderMax);
            const progressPercent = ((displayPingForSlider - minPing) / (sliderMax - minPing)) * 100;
            const sliderBackground = `linear-gradient(to right, #c59a68 ${progressPercent}%, #e5e7eb ${progressPercent}%)`;

            // 數字格式化工具
            const formatNumber = (num) => {
                return num.toLocaleString('zh-TW');
            };

            return (
                <div className="min-h-screen flex flex-col items-center pb-12">
                    {/* Header Banner */}
                    <div className="w-full bg-h-blue text-white pt-12 pb-24 px-6 relative rounded-b-[40px] shadow-lg">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-end">
                            <div className="mb-6 md:mb-0">
                                <h1 className="text-4xl md:text-5xl font-black mb-3 leading-tight">新家裝修 成家方案</h1>
                                <p className="text-h-gold-light font-bold tracking-wider text-lg block">免費試算</p>
                            </div>
                            <div className="text-left md:text-right w-full md:w-auto">
                                <div className="text-h-gold-light text-4xl md:text-6xl font-black flex items-baseline justify-start md:justify-end gap-1">
                                    <span className="text-2xl md:text-3xl">$</span>15,000
                                </div>
                                <p className="text-gray-300 text-sm mt-2 md:mt-1">成家方案 / 坪</p>
                            </div>
                        </div>
                    </div>

                    {}
                    {/* Main Calculator Card */}
                    <div className="max-w-4xl w-full px-4 -mt-16 relative z-10">
                        <div className="glass-panel rounded-3xl shadow-2xl p-6 md:p-10 border border-gray-100">
                            
                            {/* 坪數輸入區 */}
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 border-b border-gray-100 pb-8 gap-4">
                                <div>
                                    <h2 className="text-xl md:text-2xl font-bold text-h-blue mb-2">請輸入您的室內坪數</h2>
                                    <p className="text-gray-400 text-sm flex items-center gap-1">
                                        <svg className="w-4 h-4 text-h-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        不足15坪以15坪計，可手動輸入坪數
                                    </p>
                                </div>
                                <div className="flex items-end self-end md:self-auto">
                                    <input 
                                        type="number" 
                                        value={inputValue}
                                        onChange={handleInputChange}
                                        onBlur={handleInputBlur}
                                        className="text-5xl md:text-6xl font-black text-h-blue bg-transparent border-b-2 border-h-gold-light text-right w-24 md:w-32 focus:outline-none focus:border-h-gold transition-colors pb-1 mr-2"
                                    />
                                    <span className="text-xl text-gray-500 font-bold mb-3">坪</span>
                                </div>
                            </div>

                            {/* 滑桿控制 (僅作為輔助) */}
                            <div className="mb-12 relative pt-2 pb-6">
                                <input 
                                    type="range" 
                                    min={minPing} 
                                    max={sliderMax} 
                                    value={Math.min(ping || minPing, sliderMax)} 
                                    onChange={handleSliderChange}
                                    className="w-full relative z-10"
                                    style={{ background: sliderBackground }}
                                />
                                <div className="flex justify-between text-gray-400 text-sm font-medium mt-4">
                                    <span>{minPing}坪 (最低)</span>
                                    <span>{sliderMax}坪</span>
                                </div>
                            </div>

                            {}
                            {/* 價格結果區 */}
                            <div className="bg-gray-50 rounded-2xl p-6 md:p-8 flex flex-col md:flex-row justify-between items-center gap-6 border border-gray-100 mb-6">
                                <div className="text-center md:text-left w-full md:w-auto">
                                    <h3 className="text-h-blue font-bold text-lg mb-1">成家方案總價</h3>
                                    <p className="text-gray-500 text-sm">以每坪 $15,000 計算</p>
                                </div>
                                
                                <div className="text-center md:text-right w-full md:w-auto">
                                    <div className="text-h-blue text-4xl md:text-5xl font-black flex items-center justify-center md:justify-end gap-2">
                                        <span className="text-2xl md:text-3xl font-bold">NT$</span>
                                        {formatNumber(standardTotal)}
                                    </div>
                                </div>
                            </div>

                            {/* 限量優惠促銷區塊 */}
                            <div className="bg-gradient-to-r from-[#1a2b49] to-[#2a4365] rounded-2xl p-6 md:p-8 text-white relative overflow-hidden">
                                {/* 裝飾背景 */}
                                <div className="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-5 rounded-full blur-2xl"></div>
                                <div className="absolute right-20 -bottom-10 w-32 h-32 bg-h-gold opacity-10 rounded-full blur-xl"></div>
                                
                                <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="w-full md:w-3/5">
                                        <div className="inline-flex items-center bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold mb-3 tracking-wider">
                                            <span className="w-2 h-2 rounded-full bg-white mr-2 animate-pulse"></span>
                                            限量供應中・僅剩 14 組
                                        </div>
                                        <h4 className="text-xl md:text-2xl font-bold text-h-gold-light mb-2">指定檔期開工・享早鳥 9 折</h4>
                                        <p className="text-gray-300 text-sm leading-relaxed mb-4">
                                            凡指定於 <strong className="text-white font-bold text-base">10月 - 12月</strong> 開工，即享早鳥專案優惠價 <strong className="text-white font-bold text-base">$13,500/坪</strong>。名額有限，額滿即恢復原價。
                                        </p>
                                    </div>
                                    
                                    <div className="w-full md:w-2/5 text-center md:text-right border-t md:border-t-0 md:border-l border-white/20 pt-4 md:pt-0 md:pl-6">
                                        <p className="text-gray-400 text-sm mb-1">折扣後總價</p>
                                        <div className="text-h-gold-light text-3xl md:text-4xl font-black flex items-center justify-center md:justify-end gap-1">
                                            <span className="text-xl font-bold">NT$</span>
                                            {formatNumber(discountTotal)}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CalculatorApp />);
    </script>
</body>
</html>
